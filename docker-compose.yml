services:
  ingestion:
    build: ./ingestion
    volumes:
      - ./pdfs:/app/pdfs
      - ./output:/app/output
    env_file:
      - .env

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/firebase-credentials.json
